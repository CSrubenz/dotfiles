# ==============================================================================
# FUZZEL CONFIGURATION
# ==============================================================================

[main]
include=./themes/catppuccin-mocha/lavender.ini
# Typography and interface
font=Noto Sans:weight=medium:size=12
terminal=foot -e
prompt="❯ "
layer=overlay

# Dimensions and espacements
lines=10
width=40
horizontal-pad=20
vertical-pad=15
inner-pad=5
line-height=24
image-size-ratio=0.5

# Icones
icon-theme=Papirus-Dark
icons-enabled=yes


[border]
width=2
radius=8                   # rounded corners for Hyprland & Mako
