# ==============================================================================
# HYPRLOCK CONFIGURATION
# ==============================================================================

# --- THEME ---
source = ./themes/mocha.conf

# --- Background ---
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.6172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- MDP ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba($lavenderAlphaee)
    inner_color = rgba($surface0Alpha80)
    font_color = rgb($text)

    fade_on_empty = false
    placeholder_text = <i>🔒</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# --- CLOCK ---
label {
    monitor =
    text = $TIME
    color = rgba($textAlphae6)
    font_size = 90
    font_family = Noto Sans Bold
    position = 0, 80
    halign = center
    valign = center
}

# --- USER MESSAGE ---
label {
    monitor =
    text = Hello, $USER
    color = rgba($subtext1Alphab3)
    font_size = 18
    font_family = Noto Sans
    position = 0, 0
    halign = center
    valign = center
}
