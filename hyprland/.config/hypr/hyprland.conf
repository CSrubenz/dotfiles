# ==============================================================================
#           HYPRLAND CONFIGURATION (Wayland + AZERTY + Dev/Gaming)             #
# ==============================================================================

# --- THEME ---
source = ./themes/mocha.conf

# --- Env var ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GTK_THEME,catppuccin-mocha-lavender-standard+default
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# --- AUTOSTART ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = mako
exec-once = foot --server
exec-once = hypridle
exec-once = hyprpaper
exec-once = fcitx5 -d


# --- INPUT ---
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options = caps:swapescape    # for vim
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
    sensitivity = 0
}

device {
    name = logitech-mx-vertical-advanced-ergonomic-mouse
    accel_profile = flat
    sensitivity = 0.5
}

device {
    name = logitech-anywhere-2s-mouse
    accel_profile = flat
    sensitivity = 0.3
}

device {
    name = logitech-usb-receiver
    accel_profile = flat
    sensitivity = 0.5
}

device {
    name = synaptics-tm3276-022
    accel_profile = adaptive
    sensitivity = 0.3
}

device {
    name = tpps/2-ibm-trackpoint
    accel_profile = adaptive
    sensitivity = 0.5
}

# --- APPEARANCE ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba($lavenderAlphaee) rgba($mauveAlphaee) 45deg
    col.inactive_border = rgba($surface1Alphaaa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- MONITORS ---
monitor=,preferred,auto,1

misc {
    vrr = 1 # Active FreeSync / G-Sync
}

render {
    direct_scanout = 1 # Reduce latence
    cm_auto_hdr = 1
}

# ==============================================================================
# SYSTEM SHORTCUTS
# ==============================================================================
$mainMod = SUPER

# Main App
bind = $mainMod CONTROL, T, exec, footclient
bind = $mainMod CONTROL, D, exec, fuzzel
bind = $mainMod CONTROL, B, exec, firefox
bind = $mainMod CONTROL, F, exec, pcmanfm
bind = $mainMod CONTROL, L, exec, hyprlock

# Windows management
bind = $mainMod CONTROL, K, killactive
bind = $mainMod CONTROL, E, exit

# --- Screenshot (Grim + Slurp) ---
bind = $mainMod CONTROL, S, exec, grim -g "$(slurp)" - | wl-copy


bind = $mainMod, F, fullscreen

# --- Move focus ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- RESIZE MODE ---
bind = $mainMod ALT, R, submap, resize
submap = resize

    # Resize with HJKL
    binde = , L, resizeactive, 20 0
    binde = , H, resizeactive, -20 0
    binde = , K, resizeactive, 0 -20
    binde = , J, resizeactive, 0 20

    # Escape to return normal mode
    bind = , escape, submap, reset
submap = reset

# --- SWAP MODE ---
bind = $mainMod ALT, M, submap, swap
submap = swap

    # Swap with HJKL
    binde = , L, swapwindow, r
    binde = , H, swapwindow, l
    binde = , K, swapwindow, u
    binde = , J, swapwindow, d

    # Escape to return normal mode
    bind = , escape, submap, reset
submap = reset

# --- WORKSPACES (AZERTY) ---
bind = $mainMod, N, workspace, m+1
bind = $mainMod, P, workspace, m-1
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

bind = $mainMod SHIFT, N, movetoworkspacesilent, m+1
bind = $mainMod SHIFT, P, movetoworkspacesilent, m-1
bind = $mainMod SHIFT, ampersand, movetoworkspacesilent, 1
bind = $mainMod SHIFT, eacute, movetoworkspacesilent, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspacesilent, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspacesilent, 4
bind = $mainMod SHIFT, parenleft, movetoworkspacesilent, 5
bind = $mainMod SHIFT, minus, movetoworkspacesilent, 6
bind = $mainMod SHIFT, egrave, movetoworkspacesilent, 7
bind = $mainMod SHIFT, underscore, movetoworkspacesilent, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspacesilent, 9
bind = $mainMod SHIFT, agrave, movetoworkspacesilent, 10

bind = $mainMod ALT, N, movetoworkspace, m+1
bind = $mainMod ALT, P, movetoworkspace, m-1
bind = $mainMod ALT, ampersand, movetoworkspace, 1
bind = $mainMod ALT, eacute, movetoworkspace, 2
bind = $mainMod ALT, quotedbl, movetoworkspace, 3
bind = $mainMod ALT, apostrophe, movetoworkspace, 4
bind = $mainMod ALT, parenleft, movetoworkspace, 5
bind = $mainMod ALT, minus, movetoworkspace, 6
bind = $mainMod ALT, egrave, movetoworkspace, 7
bind = $mainMod ALT, underscore, movetoworkspace, 8
bind = $mainMod ALT, ccedilla, movetoworkspace, 9
bind = $mainMod ALT, agrave, movetoworkspace, 10

# toggle & send to scratchpad
bind = $mainMod, S, togglespecialworkspace
bind = $mainMod SHIFT, S, movetoworkspace, special


bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow     # Left click
bindm = $mainMod, mouse:273, resizewindow   # Right click
bindm = $mainMod, mouse:274, togglefloating # Middle click


# --- MULTIMEDIA AND BRIGHTNESS KEYS ---
bindel = , xf86audioraisevolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , xf86audiolowervolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , xf86audiomute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , xf86monbrightnessup, exec, brightnessctl set 5%+
bindel = , xf86monbrightnessdown, exec, brightnessctl set 5%-
bindl  = , xf86audioplay, exec, playerctl play-pause
bindl  = , xf86audionext, exec, playerctl next
bindl  = , xf86audioprev, exec, playerctl previous
